<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>wht</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    background:black;
    color:white;
}

/* VIDEO FUNDO */
#bg-video{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-20;

    filter:brightness(1);
}

/* OVERLAY */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:transparent;
    z-index:-10;
}
/* GRAIN */
.background::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    opacity:0.03;
    background-image:
    radial-gradient(white 1px, transparent 1px);
    background-size:35px 35px;
}

/* TELA ENTRADA */
.enter-screen{
    position:fixed;
    width:100%;
    height:100%;
    backdrop-filter:blur(12px);
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    transition:1s ease;
}

.enter-box{
    padding:28px 60px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    font-size:22px;
    letter-spacing:2px;
    cursor:pointer;
    transition:0.3s;
    user-select:none;
    box-shadow:0 0 40px rgba(255,255,255,0.04);
}

.enter-box:hover{
    transform:scale(1.04);
    background:rgba(255,255,255,0.08);
}

/* PERFIL */
.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    transition:1.2s ease;
}

.profile-card{
    width:420px;
    padding:42px;
    border-radius:28px;

    background:transparent;
    border:none;
    backdrop-filter:none;

    text-align:center;
    position:relative;
    overflow:hidden;
    box-shadow:none;
}

/* GLOW */
.profile-card::before{
    content:'';
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,255,255,0.04);
    border-radius:50%;
    top:-120px;
    right:-120px;
    filter:blur(70px);
}

/* FOTO */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,0.12);
    box-shadow:0 0 40px rgba(255,255,255,0.08);
    margin-bottom:20px;
}

/* NOME */
h1{
    font-size:40px;
    font-weight:700;
    letter-spacing:1px;
}

/* BADGES */
.badges{
    margin-top:12px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.badges img{
    width:30px;
    height:30px;
    transition:0.3s;
}

.badges img:hover{
    transform:scale(1.12);
}

/* BIO */
.bio{
    margin-top:18px;
    color:#aaa;
    line-height:1.7;
    font-size:15px;
}

/* REDES */
.socials{
    margin-top:24px;
    display:flex;
    justify-content:center;
    gap:16px;
}

.socials a{
    width:48px;
    height:48px;
    border-radius:14px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.socials a:hover{
    transform:translateY(-4px);
    background:white;
}

.socials img{
    width:22px;
    height:22px;
}

/* FOOTER */
.footer{
    margin-top:28px;
    color:#666;
    font-size:13px;
}

/* MOBILE */
@media(max-width:500px){

.profile-card{
    width:92%;
    padding:32px;
}

h1{
    font-size:34px;
}

}

</style>
</head>

<body>

<!-- VIDEO FUNDO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="background.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="background"></div>

<!-- MUSICA -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- ENTRADA -->
<div class="enter-screen" id="enterScreen">

    <div class="enter-box" onclick="enterSite()">
        soul
    </div>

</div>

<!-- PERFIL -->
<div class="container" id="mainContent">

    <div class="profile-card">

        <!-- FOTO -->
        <!-- FOTO CLICAVEL -->
<a href="https://fakecrime.bio/w7" target="_blank" class="avatar-link">

    <img src="avatar.jpg" class="avatar">

</a>

        <!-- NOME -->
        <h1>wht</h1>

        <!-- BADGES -->
        <div class="badges">

            <!-- NITRO -->
            <img src="https://cdn.discordapp.com/attachments/1268019829860990989/1506976769134166017/discordnitro.png?ex=6a157efc&is=6a142d7c&hm=7d8dc9ed913a761905507210b198ff0444cffade4cef5539eca3365970daf409&">

            <!-- BOOST -->
            <img src="https://cdn.discordapp.com/attachments/1268019829860990989/1506976663878242476/discordboost9.png?ex=6a157ee2&is=6a142d62&hm=8bce69288e1270bb10bf8e77ad10f5500f37077da02e58861f3ec2fb0bd10a32&">

        </div>

        <!-- BIO -->
        <p class="bio">

        <!-- REDES -->

        </div>

    </div>

</div>

<script>

const enterScreen = document.getElementById('enterScreen');
const mainContent = document.getElementById('mainContent');
const music = document.getElementById('music');

function enterSite(){

    music.volume = 0.5;
    music.play();

    enterScreen.style.opacity = '0';
    enterScreen.style.pointerEvents = 'none';

    mainContent.style.opacity = '1';

}

</script>

</body>
</html>
